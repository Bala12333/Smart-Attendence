# Database Configuration (Defaults to H2 for local, uses env vars for Render/Production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./attendance}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Security / JWT
app.jwt.secret=change_this_development_secret_key
app.jwt.expiration-ms=86400000

server.port=${PORT:8080}

